  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --text: #ccc;
      --muted: #666;
      --accent: #ff003c;
      --yellow: #ffaa00;
      --blue: #61dafb;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.7;
      min-height: 100vh;
    }

    nav.topnav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 40px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(10, 10, 15, .92);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .nav-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      color: var(--accent);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 24px;
      list-style: none;
    }

    .nav-links a {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      text-decoration: none;
      transition: color .2s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--text);
    }

    /* Hero */
    .hero {
      max-width: 1100px;
      margin: 0 auto;
      padding: 72px 40px 48px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }

    .badge {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .14em;
      color: var(--yellow);
      border: 1px solid var(--yellow);
      padding: 4px 10px;
      margin-bottom: 20px;
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 700;
      letter-spacing: -.03em;
      color: #eee;
    }

    h1 span {
      color: var(--yellow);
    }

    .hero-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .hero-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--yellow);
      border: 1px solid rgba(255, 170, 0, .3);
      padding: 4px 12px;
      background: rgba(255, 170, 0, .06);
    }

    /* Refresh button */
    .refresh-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 6px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: border-color .2s, color .2s, background .2s;
    }

    .refresh-btn:hover {
      border-color: var(--yellow);
      color: var(--text);
      background: rgba(255, 170, 0, .06);
    }

    .refresh-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .refresh-icon {
      width: 14px;
      height: 14px;
      color: var(--yellow);
      transition: transform .5s;
    }

    .refresh-icon.spinning {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Grid */
    .grid-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 40px 80px;
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }

    /* Card */
    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 28px;
      display: flex;
      flex-direction: column;
      min-height: 320px;
      transition: border-color .2s;
      position: relative;
    }

    .project-card:hover {
      border-color: var(--yellow);
    }

    /* Corner accents */
    .project-card .corner {
      position: absolute;
      width: 8px;
      height: 8px;
      border-color: var(--border);
      border-style: solid;
      transition: border-color .2s;
    }

    .project-card:hover .corner {
      border-color: var(--yellow);
    }

    .corner.tl { top: 0; left: 0; border-width: 1px 0 0 1px; }
    .corner.tr { top: 0; right: 0; border-width: 1px 1px 0 0; }
    .corner.bl { bottom: 0; left: 0; border-width: 0 0 1px 1px; }
    .corner.br { bottom: 0; right: 0; border-width: 0 1px 1px 0; }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .card-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .card-index {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: rgba(255, 170, 0, .4);
      flex-shrink: 0;
    }

    .card-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: #ddd;
      text-transform: uppercase;
      letter-spacing: -.01em;
      transition: color .2s;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 200px;
    }

    .project-card:hover .card-title {
      color: var(--yellow);
    }

    .card-actions {
      display: flex;
      gap: 6px;
      opacity: 0;
      transition: opacity .2s;
      flex-shrink: 0;
    }

    .project-card:hover .card-actions {
      opacity: 1;
    }

    .card-action-link {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 4px 8px;
      transition: color .2s, border-color .2s, background .2s;
    }

    .card-action-link:hover {
      color: var(--text);
      border-color: var(--muted);
      background: rgba(255, 255, 255, .03);
    }

    .card-action-link.demo {
      color: var(--yellow);
      border-color: rgba(255, 170, 0, .4);
      background: rgba(255, 170, 0, .07);
    }

    .card-action-link.demo:hover {
      background: rgba(255, 170, 0, .15);
    }

    .card-desc {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7;
      flex: 1;
      margin-bottom: 20px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Language bar */
    .lang-bar-wrap {
      margin-bottom: 20px;
    }

    .lang-bar {
      display: flex;
      height: 6px;
      width: 100%;
      overflow: hidden;
      border-radius: 99px;
      background: var(--border);
      margin-bottom: 8px;
    }

    .lang-bar-segment {
      height: 100%;
    }

    .lang-bar-segment:first-child { border-radius: 99px 0 0 99px; }
    .lang-bar-segment:last-child { border-radius: 0 99px 99px 0; }
    .lang-bar-segment:only-child { border-radius: 99px; }

    .lang-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
    }

    .lang-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }

    .lang-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .lang-pct {
      color: rgba(102, 102, 102, .6);
    }

    .lang-analyzing {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: rgba(102, 102, 102, .6);
      font-style: italic;
    }

    /* Skeleton pulse */
    .skeleton {
      background: var(--surface);
      border: 1px solid var(--border);
      min-height: 320px;
      animation: pulse .8s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { opacity: 0.5; }
      to { opacity: 0.8; }
    }

    /* Card footer / topics */
    .card-footer {
      margin-top: auto;
      padding-top: 20px;
      border-top: 1px dashed var(--border);
    }

    .card-topics {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .topics-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      font-style: italic;
      margin-right: 4px;
    }

    .topic-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: rgba(255, 170, 0, .8);
      border: 1px solid rgba(255, 170, 0, .2);
      padding: 2px 8px;
      background: rgba(255, 170, 0, .05);
      transition: border-color .15s;
    }

    .topic-tag:hover {
      border-color: rgba(255, 170, 0, .5);
    }

    .no-topics {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: rgba(102, 102, 102, .6);
      font-style: italic;
    }

    /* Error state */
    .error-box {
      background: rgba(255, 0, 60, .06);
      border: 1px solid rgba(255, 0, 60, .2);
      padding: 28px;
      text-align: center;
    }

    .error-box p {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: #ff003c;
      margin-bottom: 16px;
    }

    .error-box button {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 8px 20px;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }

    .error-box button:hover {
      border-color: var(--yellow);
      color: var(--text);
    }

    /* GitHub CTA */
    .github-cta {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 40px 64px;
      text-align: center;
    }

    .github-cta p {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 16px;
    }

    .github-btn {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 10px 28px;
      transition: border-color .2s, background .2s;
    }

    .github-btn:hover {
      border-color: var(--yellow);
      background: rgba(255, 170, 0, .05);
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    footer p {
      color: var(--muted);
      font-size: 12px;
      margin: 0;
    }

    footer nav {
      display: flex;
      gap: 16px;
    }

    footer a {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
    }

    footer a:hover {
      color: var(--text);
    }

    @media (max-width: 600px) {
      nav.topnav,
      .hero,
      .grid-container,
      .github-cta,
      footer {
        padding-left: 20px;
        padding-right: 20px;
      }

      .nav-links {
        gap: 14px;
      }

      .projects-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

  <script>
    // ─── Constants matching projectService.ts and ProjectsApp.tsx ───────────────
    const PROJECTS_CACHE_KEY = 'portfolio_projects_data';
    const LANGUAGES_CACHE_KEY = 'portfolio_languages_cache';
    const GITHUB_USERNAME = 'mtcodes01';

    const LANGUAGE_COLORS = {
      'TypeScript': '#3178c6',
      'JavaScript': '#f1e05a',
      'Python': '#3572A5',
      'HTML': '#e34c26',
      'CSS': '#563d7b',
      'C': '#555555',
      'C++': '#f34b7d',
      'Java': '#b07219',
      'Rust': '#dea584',
      'Go': '#00ADD8',
      'Shell': '#89e051',
      'Vue': '#41b883',
      'React': '#61dafb',
      'PHP': '#4F5D95',
      'Ruby': '#701516',
    };

    // ─── State ──────────────────────────────────────────────────────────────────
    let repos = [];
    let isLoading = false;

    // ─── DOM refs ───────────────────────────────────────────────────────────────
    const grid = document.getElementById('projects-grid');
    const countEl = document.getElementById('repo-count');
    const refreshBtn = document.getElementById('refresh-btn');
    const refreshIcon = document.getElementById('refresh-icon');
    const refreshLabel = document.getElementById('refresh-label');

    // ─── Helpers ────────────────────────────────────────────────────────────────
    function titleFromName(name) {
      return name.split('-').map(s => s.charAt(0).toUpperCase() + s.slice(1)).join(' ');
    }

    function setLoading(loading) {
      isLoading = loading;
      refreshBtn.disabled = loading;
      if (loading) {
        refreshIcon.classList.add('spinning');
        refreshLabel.textContent = 'Loading...';
        countEl.textContent = 'ANALYZING...';
      } else {
        refreshIcon.classList.remove('spinning');
        refreshLabel.textContent = 'Refresh';
      }
    }

    // ─── Language fetch (mirrors ProjectCard useEffect) ──────────────────────
    async function fetchLanguages(repoName, languagesUrl) {
      // Try cache first
      let cache = {};
      try {
        const raw = localStorage.getItem(LANGUAGES_CACHE_KEY);
        cache = raw ? JSON.parse(raw) : {};
      } catch (e) { /* ignore */ }

      if (cache[repoName]) return cache[repoName];

      try {
        const res = await fetch(languagesUrl, {
          headers: { 'Accept': 'application/vnd.github.v3+json' }
        });
        if (!res.ok) throw new Error();
        const data = await res.json();

        const totalBytes = Object.values(data).reduce((a, b) => a + b, 0);
        const processed = Object.entries(data)
          .map(([name, bytes]) => ({
            name,
            percentage: totalBytes > 0
              ? parseFloat((bytes / totalBytes * 100).toFixed(1))
              : 0,
            color: LANGUAGE_COLORS[name] || `hsl(${Math.abs(name.charCodeAt(0) * 37) % 360}, 65%, 60%)`,
          }))
          .sort((a, b) => b.percentage - a.percentage);

        // Write back to cache (re-read first to prevent race)
        try {
          const latestRaw = localStorage.getItem(LANGUAGES_CACHE_KEY);
          const latestCache = latestRaw ? JSON.parse(latestRaw) : {};
          latestCache[repoName] = processed;
          localStorage.setItem(LANGUAGES_CACHE_KEY, JSON.stringify(latestCache));
        } catch (e) { /* ignore */ }

        return processed;
      } catch (err) {
        return [];
      }
    }

    // ─── Build language bar HTML ─────────────────────────────────────────────
    function langBarHTML(languages) {
      if (!languages || languages.length === 0) {
        return `<div class="lang-analyzing">ANALYZING_CODE_COMPOSITION...</div>`;
      }
      const segments = languages
        .map(l => `<div class="lang-bar-segment" style="width:${l.percentage}%;background:${l.color}" title="${l.name}: ${l.percentage}%"></div>`)
        .join('');
      const legend = languages
        .map(l => `<div class="lang-item"><span class="lang-dot" style="background:${l.color}"></span>${l.name}<span class="lang-pct">${l.percentage}%</span></div>`)
        .join('');
      return `<div class="lang-bar">${segments}</div><div class="lang-legend">${legend}</div>`;
    }

    // ─── Render a single card ─────────────────────────────────────────────────
    function buildCard(repo, index) {
      const title = titleFromName(repo.name);
      const desc = repo.description || 'Experimental module with dynamic parameters.';
      const demoUrl = repo.homepage && repo.homepage.trim() !== '' ? repo.homepage : null;
      const topics = (repo.topics || []).filter(t => t !== 'portfolio');
      const idxStr = String(index + 1).padStart(2, '0');

      const topicsHTML = topics.length > 0
        ? `<span class="topics-label">MODULE_TAGS:</span>${topics.map(t => `<span class="topic-tag">${t}</span>`).join('')}`
        : `<span class="no-topics">NO_TAG_METADATA_DETECTED</span>`;

      const demoBtn = demoUrl
        ? `<a href="${demoUrl}" target="_blank" rel="noopener noreferrer" class="card-action-link demo">[RUN]</a>`
        : '';

      const card = document.createElement('article');
      card.className = 'project-card';
      card.dataset.repoName = repo.name;
      card.dataset.languagesUrl = repo.languages_url;
      card.innerHTML = `
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
        <div class="card-header">
          <div class="card-header-left">
            <span class="card-index">${idxStr}</span>
            <h2 class="card-title" title="${title}">${title}</h2>
          </div>
          <div class="card-actions">
            <a href="${repo.html_url}" target="_blank" rel="noopener noreferrer"
               aria-label="View source code for ${title} on GitHub"
               class="card-action-link">[CODE]</a>
            ${demoBtn}
          </div>
        </div>
        <p class="card-desc">${desc}</p>
        <div class="lang-bar-wrap" id="lang-${repo.name}">
          <div class="lang-analyzing">ANALYZING_CODE_COMPOSITION...</div>
        </div>
        <div class="card-footer">
          <div class="card-topics">${topicsHTML}</div>
        </div>
      `;
      return card;
    }

    // ─── Render the full grid ─────────────────────────────────────────────────
    function renderGrid(data) {
      grid.innerHTML = '';
      if (!data || data.length === 0) {
        grid.innerHTML = `
          <div class="error-box" style="grid-column:1/-1">
            <p>// NO_MODULES_DETECTED</p>
            <button onclick="loadProjects(true)">Retry GitHub API</button>
          </div>`;
        return;
      }

      // Render all cards first (placeholder lang bars), then fetch languages async
      data.forEach((repo, i) => {
        const card = buildCard(repo, i);
        grid.appendChild(card);
      });

      // Now fetch languages for each card in parallel
      data.forEach(repo => {
        fetchLanguages(repo.name, repo.languages_url).then(languages => {
          const langEl = document.getElementById(`lang-${repo.name}`);
          if (langEl) langEl.innerHTML = langBarHTML(languages);
        });
      });
    }

    // ─── Show skeleton placeholders ───────────────────────────────────────────
    function showSkeletons() {
      grid.innerHTML = Array(6).fill('<div class="skeleton"></div>').join('');
    }

    // ─── Main load function ───────────────────────────────────────────────────
    async function loadProjects(forceRefresh = false) {
      if (isLoading) return;
      setLoading(true);

      if (forceRefresh) {
        localStorage.removeItem(LANGUAGES_CACHE_KEY);
        showSkeletons();
      }

      // 1. Try localStorage cache first (mirrors projectService.getCachedProjects)
      if (!forceRefresh) {
        try {
          const cached = localStorage.getItem(PROJECTS_CACHE_KEY);
          if (cached) {
            repos = JSON.parse(cached);
            countEl.textContent = `${repos.length} MODULES DETECTED`;
            renderGrid(repos);
            setLoading(false);
            return;
          }
        } catch (e) { /* fall through to API */ }
      }

      // 2. Fall back to GitHub API (mirrors projectService.fetchProjects)
      try {
        const res = await fetch(
          `https://api.github.com/users/${GITHUB_USERNAME}/repos?sort=pushed&direction=desc&per_page=100`,
          { headers: { 'Accept': 'application/vnd.github.v3+json' } }
        );
        if (!res.ok) throw new Error(`GitHub API error: ${res.status}`);
        const data = await res.json();

        repos = data.filter(repo =>
          repo.topics && repo.topics.some(t => t.toLowerCase() === 'portfolio')
        );

        // Cache it for next time
        try {
          localStorage.setItem(PROJECTS_CACHE_KEY, JSON.stringify(repos));
        } catch (e) { /* storage full, ignore */ }

        countEl.textContent = `${repos.length} MODULES DETECTED`;
        renderGrid(repos);
      } catch (err) {
        // Final fallback: try stale cache even if forceRefresh was requested
        try {
          const stale = localStorage.getItem(PROJECTS_CACHE_KEY);
          if (stale) {
            repos = JSON.parse(stale);
            countEl.textContent = `${repos.length} MODULES (CACHED)`;
            renderGrid(repos);
          } else {
            throw err;
          }
        } catch (e) {
          grid.innerHTML = `
            <div class="error-box" style="grid-column:1/-1">
              <p>// GITHUB_API_UNREACHABLE — Check your connection.</p>
              <button onclick="loadProjects(true)">Retry</button>
            </div>`;
          countEl.textContent = 'ERROR';
        }
      } finally {
        setLoading(false);
      }
    }

    // ─── Init ─────────────────────────────────────────────────────────────────
    refreshBtn.addEventListener('click', () => loadProjects(true));
    loadProjects();
  </script>

</body>

</html>
